<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Break Timer</title><style>:root{--t:#fff6dc;--m:#d2c39c;--g:#ffb000;--g2:#ffcf66;--d:#ff4d4d;--ok:#21d07a;--l:rgba(255,176,0,.28)}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;min-height:100%;font-family:Arial,Helvetica,sans-serif;color:var(--t);background:radial-gradient(circle at top,rgba(255,176,0,.18),transparent 35%),linear-gradient(135deg,#050505,#19140a 55%,#050505)}body{display:flex;justify-content:center;padding:14px}.app{width:100%;max-width:540px;min-height:calc(100vh - 28px);border:1px solid var(--l);border-radius:28px;background:linear-gradient(180deg,rgba(35,28,18,.9),rgba(18,18,18,.9));box-shadow:0 22px 70px rgba(0,0,0,.45);overflow:hidden}.top{padding:22px 20px 14px;border-bottom:1px solid var(--l);background:rgba(0,0,0,.18)}h1{margin:0;font-size:28px;color:var(--g2)}.sub{margin-top:6px;color:var(--m);font-size:14px;line-height:1.35}.tw{padding:28px 18px 18px;text-align:center}.status{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:34px;padding:8px 14px;border:1px solid var(--l);border-radius:999px;color:var(--m);background:rgba(0,0,0,.2);font-weight:700;margin-bottom:16px}.dot{width:10px;height:10px;border-radius:50%;background:var(--m);box-shadow:0 0 12px currentColor}.running .dot{background:var(--ok)}.warning .dot{background:var(--g)}.done .dot{background:var(--d)}.timer{font-size:clamp(54px,15vw,96px);font-weight:900;line-height:1;letter-spacing:-3px;color:#fff;text-shadow:0 6px 28px rgba(255,176,0,.22);margin:10px 0 12px;font-variant-numeric:tabular-nums;white-space:nowrap}.ms{font-size:.45em;color:var(--g2);letter-spacing:-1px}.line{color:var(--m);font-size:14px;min-height:20px}.controls{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:18px}button,input,textarea{font-family:inherit;font-size:16px}button{border:0;border-radius:18px;padding:16px 12px;font-weight:900;cursor:pointer;min-height:58px;color:#130d00;background:linear-gradient(180deg,var(--g2),var(--g));box-shadow:0 10px 24px rgba(0,0,0,.28)}button:active{transform:translateY(1px)}button.secondary{background:rgba(255,255,255,.08);color:var(--t);border:1px solid var(--l)}button.danger{background:linear-gradient(180deg,#ff8585,#ff3f3f);color:#1a0000}button.full{grid-column:1/-1}.panel{margin:0 18px 18px;padding:16px;border:1px solid var(--l);border-radius:22px;background:rgba(0,0,0,.18)}.panel h2{margin:0 0 10px;font-size:17px;color:var(--g2)}label{display:block;color:var(--m);font-size:13px;margin:12px 0 6px;font-weight:700}input,textarea{width:100%;border:1px solid rgba(255,176,0,.3);border-radius:14px;background:rgba(0,0,0,.34);color:var(--t);padding:13px 12px;outline:none}textarea{min-height:98px;resize:vertical}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}@media(max-width:380px){body{padding:8px}.app{min-height:calc(100vh - 16px);border-radius:22px}.timer{font-size:52px;letter-spacing:-2px}.controls{gap:9px;padding:14px}button{min-height:54px;padding:13px 8px}}</style></head><body><main class="app"><section class="top"><h1>Break Timer</h1><div class="sub">Break timer with native custom alarm only, start-time texting, 2:10 warning, and milliseconds.</div></section><section class="tw"><div id="status" class="status"><span class="dot"></span><span id="statusText">Ready</span></div><div id="timer" class="timer">10:00<span class="ms">.000</span></div><div id="smallLine" class="line">Warning sounds at 2:10.000 remaining.</div></section><section class="controls"><button id="startBtn">Start Break</button><button id="pauseBtn" class="secondary">Pause</button><button id="resetBtn" class="danger">Reset</button><button id="testBtn" class="secondary">Test Sound</button><button id="smsBtn" class="full">Text Break Started</button></section><section class="panel"><h2>Settings</h2><label for="minutes">Break Length in Minutes</label><input id="minutes" type="number" min="1" max="60" step="1" value="10"><label for="phones">Phone Numbers</label><input id="phones" type="text" placeholder="Example: 8655551234, 8655555678"><label for="message">Text Message</label><textarea id="message">Break started at {START_TIME}. Break is {BREAK_MINUTES} minutes. Break ends at {END_TIME}.</textarea><div class="grid"><button id="saveBtn" class="secondary">Save Settings</button><button id="wakeBtn" class="secondary">Keep Screen Awake</button></div></section></main><script>const $=id=>document.getElementById(id),timerEl=$('timer'),statusEl=$('status'),statusText=$('statusText'),smallLine=$('smallLine'),startBtn=$('startBtn'),pauseBtn=$('pauseBtn'),resetBtn=$('resetBtn'),testBtn=$('testBtn'),smsBtn=$('smsBtn'),saveBtn=$('saveBtn'),wakeBtn=$('wakeBtn'),minutesInput=$('minutes'),phonesInput=$('phones'),messageInput=$('message');let totalMs=6e5,remainingMs=totalMs,running=false,endTime=null,startTime=null,animationId=null,warned=false,wakeLock=null;function playAlarm(){if(window.AndroidBridge&&typeof window.AndroidBridge.playAlarmSound==='function'){window.AndroidBridge.playAlarmSound();smallLine.textContent='Playing custom alarm.'}else smallLine.textContent='Native alarm is only available in APK.';if(navigator.vibrate)navigator.vibrate([400,150,400,150,800])}function timeString(d){return d?d.toLocaleTimeString([],{hour:'numeric',minute:'2-digit',second:'2-digit'}):''}function loadSettings(){const s=JSON.parse(localStorage.getItem('breakTimerNativeSmsV5')||'{}');if(s.minutes)minutesInput.value=s.minutes;if(s.phones)phonesInput.value=s.phones;if(s.message)messageInput.value=s.message;setTotalFromInput()}function saveSettings(){localStorage.setItem('breakTimerNativeSmsV5',JSON.stringify({minutes:Number(minutesInput.value||10),phones:phonesInput.value.trim(),message:messageInput.value}));smallLine.textContent='Settings saved.';setTimeout(updateSmallLine,1400)}function setTotalFromInput(){const m=Math.max(1,Math.min(60,Number(minutesInput.value||10)));totalMs=m*6e4;if(!running){remainingMs=totalMs;updateDisplay()}}function formatMs(ms){ms=Math.max(0,Math.ceil(ms));const ts=Math.floor(ms/1000),m=Math.floor(ts/60),s=ts%60,x=ms%1000;return `${m}:${String(s).padStart(2,'0')}<span class="ms">.${String(x).padStart(3,'0')}</span>`}function updateStatus(type,text){statusEl.className='status'+(type?` ${type}`:'');statusText.textContent=text}function updateSmallLine(){if(running&&endTime)smallLine.textContent=`Started ${timeString(startTime)}. Ends ${timeString(new Date(endTime))}.`;else if(startTime&&remainingMs>0&&remainingMs<totalMs)smallLine.textContent=`Paused. Started ${timeString(startTime)}.`;else smallLine.textContent='Warning sounds at 2:10.000 remaining.'}function updateDisplay(){timerEl.innerHTML=formatMs(remainingMs);if(running)updateStatus(remainingMs<=13e4?'warning':'running',remainingMs<=13e4?'Almost Over':'Running');else if(remainingMs<=0)updateStatus('done','Break Over');else updateStatus('',startTime&&remainingMs<totalMs?'Paused':'Ready')}function tick(){if(!running)return;remainingMs=Math.max(0,endTime-Date.now());if(!warned&&remainingMs<=13e4&&remainingMs>0){warned=true;playAlarm();smallLine.textContent='2:10.000 remaining. Start wrapping up break.'}if(remainingMs<=0){running=false;remainingMs=0;updateDisplay();updateStatus('done','Break Over');smallLine.textContent=`Break is over. Started ${timeString(startTime)}.`;playAlarm();cancelAnimationFrame(animationId);animationId=null;return}updateDisplay();animationId=requestAnimationFrame(tick)}function startTimer(){setTotalFromInput();if(!running){if(!startTime||remainingMs===totalMs)startTime=new Date();running=true;warned=remainingMs<=13e4;endTime=Date.now()+remainingMs;updateSmallLine();if(animationId)cancelAnimationFrame(animationId);animationId=requestAnimationFrame(tick)}}function pauseTimer(){if(!running)return;running=false;if(animationId){cancelAnimationFrame(animationId);animationId=null}remainingMs=Math.max(0,endTime-Date.now());updateDisplay();updateStatus('','Paused');updateSmallLine()}function resetTimer(){running=false;if(animationId){cancelAnimationFrame(animationId);animationId=null}warned=false;startTime=null;endTime=null;setTotalFromInput();updateDisplay();updateSmallLine()}function makeMessage(){const now=new Date(),st=startTime||now,mins=Math.max(1,Math.min(60,Number(minutesInput.value||10))),en=endTime?new Date(endTime):new Date(st.getTime()+mins*6e4);return(messageInput.value||'Break started at {START_TIME}. Break is {BREAK_MINUTES} minutes. Break ends at {END_TIME}.').replaceAll('{START_TIME}',timeString(st)).replaceAll('{END_TIME}',timeString(en)).replaceAll('{BREAK_MINUTES}',String(mins))}function getPhones(){return phonesInput.value.split(',').map(p=>p.trim()).filter(Boolean).join(',')}function openSms(){const phones=getPhones();if(!phones){smallLine.textContent='Enter at least one phone number first.';return}const msg=makeMessage();if(window.AndroidBridge&&typeof window.AndroidBridge.sendSms==='function'){window.AndroidBridge.sendSms(phones,msg);return}window.location.href=`smsto:${phones}?body=${encodeURIComponent(msg)}`}async function toggleWakeLock(){try{if(!('wakeLock'in navigator)){smallLine.textContent='Screen wake lock is not supported in this browser.';return}if(wakeLock){await wakeLock.release();wakeLock=null;smallLine.textContent='Screen wake lock: off';return}wakeLock=await navigator.wakeLock.request('screen');smallLine.textContent='Screen wake lock: on';wakeLock.addEventListener('release',()=>wakeLock=null)}catch(e){smallLine.textContent='Screen wake lock could not be turned on.'}}document.addEventListener('visibilitychange',async()=>{if(document.visibilityState==='visible'&&running&&wakeLock===null)try{if('wakeLock'in navigator)wakeLock=await navigator.wakeLock.request('screen')}catch{}});startBtn.addEventListener('click',startTimer);pauseBtn.addEventListener('click',pauseTimer);resetBtn.addEventListener('click',resetTimer);testBtn.addEventListener('click',()=>playAlarm());smsBtn.addEventListener('click',openSms);saveBtn.addEventListener('click',saveSettings);wakeBtn.addEventListener('click',toggleWakeLock);minutesInput.addEventListener('change',()=>{setTotalFromInput();saveSettings()});loadSettings();updateDisplay();</script></body></html>
